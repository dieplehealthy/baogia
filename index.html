<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Giá Sản Phẩm Herbalife</title>
    <style>
        :root {
            --primary: #ff6b9d;
            --bg: #fff5f8;
            --text: #333;
            --border: #ffe0eb;
            --white: #ffffff;
            --success: #28a745;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size: 22px; }
        p.subtitle { text-align: center; color: #666; margin-top: 0; font-size: 14px; }
        
        .header-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary { background: var(--primary); color: white; flex: 1; }
        .btn-secondary { background: #6c757d; color: white; flex: 1; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 5px 10px; font-size: 12px; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(255, 107, 157, 0.1);
            border: 1px solid var(--border);
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .filter-group {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .filter-chip {
            padding: 5px 10px;
            background: #f0f0f0;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .filter-chip.active {
            background: var(--primary);
            color: white;
        }
        .filter-chip:hover { border-color: var(--primary); }

        .search-results { 
            margin-top: 10px; 
            max-height: 350px;   
            overflow-y: auto; 
            border-top: 1px dashed #eee;
            padding-top: 5px;
        }
        .search-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 8px;
            border-bottom: 1px dashed #eee;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .search-item:hover { 
            background: #fff0f5; 
            cursor: pointer;
        }
        .item-category {
            display: inline-block;
            background: #fff0f5;
            color: var(--primary);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
        }

        .selected-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .selected-table th { 
            background: #fff0f5; 
            color: var(--primary); 
            padding: 8px 5px; 
            text-align: left; 
            border-bottom: 2px solid var(--border);
            font-size: 12px;
        }
        .selected-table td { 
            padding: 10px 5px; 
            text-align: left; 
            border-bottom: 1px solid #f0f0f0; 
            vertical-align: top;
        }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .qty-control { display: flex; align-items: center; gap: 5px; justify-content: center; }
        .qty-control button { 
            padding: 2px 8px; 
            font-size: 14px; 
            background: #eee; 
            color: #333; 
            border-radius: 4px;
        }

        .price-original {
            color: #999;
            text-decoration: line-through;
            font-size: 12px;
            display: block;
        }
        .price-discount {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            display: block;
        }
        .price-saved {
            color: var(--success);
            font-size: 11px;
            font-style: italic;
            display: block;
            margin-top: 2px;
        }
        .pv-info {
            color: #888;
            font-size: 11px;
            margin-top: 3px;
        }

        .discount-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff0f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .discount-box select {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .totals {
            background: linear-gradient(135deg, #ff6b9d, #ff8e53);
            color: white;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .saved-summary {
            background: #e8f5e9;
            color: var(--success);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        .saved-summary.show { display: block; }

        .bottom-actions { display: flex; gap: 10px; }
        .bottom-actions button { flex: 1; padding: 12px; font-size: 15px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
        }
        .setting-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 40px;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .setting-row input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
        }
        .empty-msg { text-align: center; color: #999; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

    <h1>🌸 Bảng Giá Sản Phẩm</h1>
    <p class="subtitle">Chọn sản phẩm & mức chiết khấu để tính đơn hàng</p>

    <div class="header-actions">
        <button class="btn-primary" onclick="alert('Chức năng đặt hàng / Chuyển đơn!')">🛒 Đặt hàng</button>
        <button class="btn-secondary" onclick="openSettings()">⚙️ Cài đặt giá</button>
    </div>

    <!-- Tìm kiếm + Lọc nhóm -->
    <div class="card">
        <input type="text" id="searchInput" class="search-box" 
               placeholder="🔍 Nhấn để xem danh sách sản phẩm..." 
               oninput="renderSearch()" 
               onfocus="renderSearch()">
        <div class="filter-group" id="filterGroup"></div>
        <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Sản phẩm đã chọn -->
    <div class="card">
        <div class="section-title">
            <span>🌷 Sản phẩm đã chọn (<span id="selectedCount">0</span>)</span>
        </div>
        <div id="selectedList">
            <p class="empty-msg">Chưa có sản phẩm nào. Nhấn vào ô tìm kiếm để thêm nhé!</p>
        </div>
    </div>

    <!-- Khu vực Chiết khấu -->
    <div class="discount-box">
        <label for="discountSelect" style="font-weight: 600; white-space: nowrap;">Mức CK:</label>
        <select id="discountSelect" onchange="updateTotals()">
            <option value="0">Giá lẻ (0%)</option>
            <option value="25">Chiết khấu 25%</option>
            <option value="35">Chiết khấu 35%</option>
            <option value="42">Chiết khấu 42%</option>
            <option value="50">Chiết khấu 50%</option>
        </select>
    </div>

    <!-- Thông báo tiết kiệm -->
    <div class="saved-summary" id="savedSummary">
        🎉 Bạn đã tiết kiệm: <span id="totalSaved">0</span> ₫
    </div>

    <!-- Tổng kết -->
    <div class="totals">
        <div>🌸 PV: <span id="totalPV">0</span></div>
        <div>💰 Tiền: <span id="totalMoney">0</span> ₫</div>
    </div>

    <!-- Action buttons -->
    <div class="bottom-actions">
        <button class="btn-success" onclick="copyQuote()">📋 Sao chép đơn hàng</button>
        <button class="btn-secondary" onclick="saveData()">💾 Lưu thay đổi</button>
    </div>

    <!-- Modal Cài đặt -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2 style="margin-top:0; color: var(--primary);">⚙️ Cài đặt Danh mục</h2>
            <p style="font-size: 13px; color: #666;">Sửa Tên, Đơn giá gốc và Điểm PV.</p>
            <div class="setting-row" style="font-weight: 600; font-size: 12px; color: #888; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                <div>Tên sản phẩm</div>
                <div>Đơn giá</div>
                <div>Điểm PV</div>
                <div></div>
            </div>
            <div id="settingsList"></div>
            <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="addNewProduct()">+ Thêm sản phẩm mới</button>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-success" style="flex:1" onclick="saveSettings()">💾 Lưu cài đặt</button>
                <button class="btn-secondary" style="flex:1" onclick="closeSettings()">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        // DỮ LIỆU GỐC VỚI CÁC MỨC GIÁ CK TÍNH SẴN
        // Giá trong bảng gốc (nghìn đồng) × 1000 = VNĐ
        const DEFAULT_PRODUCTS = [
            // Kiểm soát cân nặng
            { id: 1, name: 'F1', category: 'Kiểm soát cân nặng', pv: 23.95, prices: { 0: 1149120, 25: 899740, 35: 799990, 42: 730160, 50: 650360 } },
            { id: 2, name: 'Protein', category: 'Kiểm soát cân nặng', pv: 17.95, prices: { 0: 891000, 25: 693800, 35: 614920, 42: 559700, 50: 496590 } },
            { id: 3, name: 'Trà', category: 'Kiểm soát cân nặng', pv: 19.95, prices: { 0: 840240, 25: 654310, 35: 579930, 42: 527870, 50: 468370 } },
            { id: 4, name: 'Prolessa Duo 74,2g', category: 'Kiểm soát cân nặng', pv: 21.7, prices: { 0: 1015200, 25: 803020, 35: 718150, 42: 658740, 50: 590840 } },
            { id: 5, name: 'Prolessa Duo 318g', category: 'Kiểm soát cân nặng', pv: 65.2, prices: { 0: 3053160, 25: 2415230, 35: 2160060, 42: 1981440, 50: 1777310 } },
            { id: 6, name: 'Cell A', category: 'Kiểm soát cân nặng', pv: 21.95, prices: { 0: 930960, 25: 724940, 35: 642530, 42: 584840, 50: 518920 } },
            { id: 7, name: 'Cell U', category: 'Kiểm soát cân nặng', pv: 15.75, prices: { 0: 697680, 25: 543350, 35: 481610, 42: 438400, 50: 389010 } },
            // Tăng cường đề kháng
            { id: 8, name: 'Vitamin', category: 'Tăng cường đề kháng', pv: 10, prices: { 0: 462240, 25: 360090, 35: 319230, 42: 290620, 50: 257930 } },
            { id: 9, name: 'Immulift', category: 'Tăng cường đề kháng', pv: 27.25, prices: { 0: 1254960, 25: 977410, 35: 866390, 42: 788670, 50: 699850 } },
            // Hệ Tiêu Hóa
            { id: 10, name: 'Lô Hội', category: 'Hệ Tiêu Hóa', pv: 24.95, prices: { 0: 1128600, 25: 878970, 35: 779120, 42: 709230, 50: 629350 } },
            { id: 11, name: 'Xơ hoạt hóa', category: 'Hệ Tiêu Hóa', pv: 22.95, prices: { 0: 1065960, 25: 830050, 35: 735690, 42: 669630, 50: 594140 } },
            { id: 12, name: 'Probiotic', category: 'Hệ Tiêu Hóa', pv: 20.45, prices: { 0: 937440, 25: 729950, 35: 646950, 42: 588850, 50: 522460 } },
            // Tim mạch
            { id: 13, name: 'Nitework', category: 'Tim mạch', pv: 48.75, prices: { 0: 2199960, 25: 1713200, 35: 1518500, 42: 1382200, 50: 1226440 } },
            { id: 14, name: 'Herbalifeline', category: 'Tim mạch', pv: 25.75, prices: { 0: 1072440, 25: 835060, 35: 740110, 42: 673640, 50: 597680 } },
            // Xương khớp
            { id: 15, name: 'Xtra-cal', category: 'Xương khớp', pv: 10.7, prices: { 0: 536760, 25: 417950, 35: 370420, 42: 337160, 50: 299140 } },
            { id: 16, name: 'Join Support', category: 'Xương khớp', pv: 20.9, prices: { 0: 935280, 25: 728280, 35: 645480, 42: 587520, 50: 521280 } },
            // Mắt
            { id: 17, name: 'Ocular', category: 'Mắt', pv: 17.2, prices: { 0: 779760, 25: 607300, 35: 538320, 42: 490030, 50: 434840 } },
            // Vận động
            { id: 18, name: 'Rebuild', category: 'Vận động', pv: 54.75, prices: { 0: 2370600, 25: 1846110, 35: 1636320, 42: 1489460, 50: 1321630 } },
            { id: 19, name: 'F1 Sport', category: 'Vận động', pv: 41.6, prices: { 0: 1813320, 25: 1412060, 35: 1251550, 42: 1139200, 50: 1010790 } },
            { id: 20, name: 'Hydrat', category: 'Vận động', pv: 22.2, prices: { 0: 1142640, 25: 903850, 35: 808340, 42: 741470, 50: 665060 } },
            { id: 21, name: 'NRG', category: 'Vận động', pv: 14.75, prices: { 0: 658800, 25: 513040, 35: 454740, 42: 413930, 50: 367280 } },
            // Hỗ trợ ngủ ngon và thư giãn
            { id: 22, name: 'Trà Tâm An', category: 'Hỗ trợ ngủ ngon', pv: 19.8, prices: { 0: 956880, 25: 756960, 35: 677000, 42: 621020, 50: 557050 } },
            // Da và Tóc
            { id: 23, name: 'Beauty Powder 8%', category: 'Da và Tóc', pv: 43.55, prices: { 0: 2246400, 25: 1749350, 35: 1550530, 42: 1411360, 50: 1252300 } },
            { id: 24, name: 'Mặt nạ giữ ẩm', category: 'Da và Tóc', pv: 12.45, prices: { 0: 576400, 25: 455930, 35: 407740, 42: 374000, 50: 335450 } },
            { id: 25, name: 'Mặt nạ sáng da', category: 'Da và Tóc', pv: 13.1, prices: { 0: 606100, 25: 479530, 35: 428900, 42: 393460, 50: 352950 } },
            { id: 26, name: 'Mặt nạ săn chắc', category: 'Da và Tóc', pv: 19.3, prices: { 0: 893200, 25: 706450, 35: 631750, 42: 579470, 50: 519710 } },
            { id: 27, name: 'Sữa rửa mặt', category: 'Da và Tóc', pv: 16.75, prices: { 0: 707300, 25: 550860, 35: 488280, 42: 444480, 50: 394420 } },
            { id: 28, name: 'Toner 50 ml', category: 'Da và Tóc', pv: 12.7, prices: { 0: 546700, 25: 425690, 35: 377280, 42: 343400, 50: 304680 } },
            { id: 29, name: 'Toner 150 ml', category: 'Da và Tóc', pv: 32.3, prices: { 0: 1394800, 25: 1086160, 35: 962700, 42: 876280, 50: 777520 } },
            { id: 30, name: 'Dưỡng ẩm số 5', category: 'Da và Tóc', pv: 28.4, prices: { 0: 1196800, 25: 932070, 35: 826180, 42: 752060, 50: 667340 } },
            { id: 31, name: 'Serum số 3', category: 'Da và Tóc', pv: 37.7, prices: { 0: 1608200, 25: 1252400, 35: 1110080, 42: 1010460, 50: 896600 } },
            { id: 32, name: 'Mắt số 4', category: 'Da và Tóc', pv: 26.35, prices: { 0: 1109900, 25: 864380, 35: 766180, 42: 697430, 50: 618870 } },
            { id: 33, name: 'Tẩy da chết', category: 'Da và Tóc', pv: 13.1, prices: { 0: 589600, 25: 459110, 35: 406910, 42: 370370, 50: 328610 } },
            { id: 34, name: 'Mặt nạ đất sét', category: 'Da và Tóc', pv: 14.2, prices: { 0: 643500, 25: 501030, 35: 444040, 42: 404150, 50: 358560 } },
            { id: 35, name: 'Bộ da cơ bản', category: 'Da và Tóc', pv: 86.25, prices: { 0: 3647600, 25: 2840690, 35: 2517920, 42: 2291990, 50: 2033780 } },
            { id: 36, name: 'Bộ da nâng cao', category: 'Da và Tóc', pv: 176.65, prices: { 0: 7475600, 25: 5821860, 35: 5160360, 42: 4697310, 50: 4168110 } },
            { id: 37, name: 'Bộ da Tối ưu', category: 'Da và Tóc', pv: 203.95, prices: { 0: 8708700, 25: 6781990, 35: 6011310, 42: 5471830, 50: 4855290 } },
            { id: 38, name: 'Dầu gội/xả', category: 'Da và Tóc', pv: 8.3, prices: { 0: 336600, 25: 262250, 35: 232500, 42: 211690, 50: 187890 } }
        ];

        // Load dữ liệu: ưu tiên localStorage, nếu chưa có thì dùng dữ liệu gốc
        let products = JSON.parse(localStorage.getItem('products')) || DEFAULT_PRODUCTS;
        let selected = JSON.parse(localStorage.getItem('selected')) || [];
        let discount = 0;
        let currentCategory = 'Tất cả';

        function formatMoney(num) {
            return new Intl.NumberFormat('vi-VN').format(num);
        }

        // Lấy giá theo mức chiết khấu (từ dữ liệu có sẵn)
        function getPrice(product, discountPercent) {
            // Nếu sản phẩm có cấu trúc prices mới
            if (product.prices) {
                return product.prices[discountPercent] || product.prices[0];
            }
            // Fallback cho sản phẩm cũ (chỉ có basePrice)
            return product.basePrice * (1 - discountPercent / 100);
        }

        // Lấy giá gốc (giá lẻ)
        function getBasePrice(product) {
            if (product.prices) return product.prices[0];
            return product.basePrice;
        }

        function getCategories() {
            const cats = [...new Set(products.map(p => p.category).filter(c => c))];
            return ['Tất cả', ...cats];
        }

        function renderFilterChips() {
            const container = document.getElementById('filterGroup');
            const categories = getCategories();
            container.innerHTML = categories.map(cat => `
                <div class="filter-chip ${cat === currentCategory ? 'active' : ''}" 
                     onclick="setCategory('${cat}')">${cat}</div>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderFilterChips();
            renderSearch();
        }

        function renderSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const container = document.getElementById('searchResults');

            let results = products;
            if (currentCategory !== 'Tất cả') {
                results = results.filter(p => p.category === currentCategory);
            }
            if (keyword) {
                results = results.filter(p => p.name.toLowerCase().includes(keyword));
            }

            if (results.length === 0) {
                container.innerHTML = '<p class="empty-msg">Không tìm thấy sản phẩm</p>';
                return;
            }

            container.innerHTML = results.map(p => {
                const basePrice = getBasePrice(p);
                const currentPrice = getPrice(p, discount);
                return `
                    <div class="search-item" onclick="addToSelected(${p.id})">
                        <div>
                            <strong>${p.name}</strong>
                            ${p.category ? `<span class="item-category">${p.category}</span>` : ''}
                            <br>
                            <small style="color:#666">
                                ${discount > 0 ? `<s>${formatMoney(basePrice)}</s> → ` : ''}
                                <strong style="color:var(--primary)">${formatMoney(currentPrice)} ₫</strong> | PV: ${p.pv}
                            </small>
                        </div>
                        <button class="btn-primary btn-sm" onclick="event.stopPropagation(); addToSelected(${p.id})">+ Thêm</button>
                    </div>
                `;
            }).join('');
        }

        function addToSelected(id) {
            const prod = products.find(p => p.id === id);
            const exist = selected.find(s => s.id === id);
            if (exist) {
                exist.qty += 1;
            } else {
                selected.push({ ...prod, qty: 1 });
            }
            renderSelected();
            updateTotals();
        }

        function renderSelected() {
            const container = document.getElementById('selectedList');
            document.getElementById('selectedCount').innerText = selected.length;

            if (selected.length === 0) {
                container.innerHTML = '<p class="empty-msg">Chưa có sản phẩm nào. Nhấn vào ô tìm kiếm để thêm nhé!</p>';
                return;
            }

            let html = `
                <table class="selected-table">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th class="text-center">SL</th>
                            <th class="text-right">Đơn giá</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            selected.forEach(item => {
                const giaGoc = getBasePrice(item);
                const giaHienTai = getPrice(item, discount);
                const thanhTien = giaHienTai * item.qty;
                const tongGoc = giaGoc * item.qty;
                const tietKiem = discount > 0 ? (tongGoc - thanhTien) : 0;

                let priceCell = '';
                if (discount > 0) {
                    priceCell = `
                        <span class="price-original">${formatMoney(giaGoc)} ₫</span>
                        <span class="price-discount">${formatMoney(giaHienTai)} ₫</span>
                        <span class="price-saved">TK: ${formatMoney(tietKiem)} ₫</span>
                    `;
                } else {
                    priceCell = `<span class="price-discount">${formatMoney(giaGoc)} ₫</span>`;
                }

                html += `
                    <tr>
                        <td>
                            <strong>${item.name}</strong>
                            <div class="pv-info">🌸 PV: ${(item.pv * item.qty).toFixed(2).replace(/\.00$/, '')}</div>
                        </td>
                        <td class="text-center">
                            <div class="qty-control">
                                <button onclick="changeQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </td>
                        <td class="text-right">${priceCell}</td>
                        <td><button class="btn-danger" onclick="removeItem(${item.id})">X</button></td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function changeQty(id, delta) {
            const item = selected.find(s => s.id === id);
            item.qty += delta;
            if (item.qty <= 0) selected = selected.filter(s => s.id !== id);
            renderSelected();
            updateTotals();
        }

        function removeItem(id) {
            selected = selected.filter(s => s.id !== id);
            renderSelected();
            updateTotals();
        }

        function updateTotals() {
            discount = parseFloat(document.getElementById('discountSelect').value);
            let totalPV = 0;
            let totalMoney = 0;
            let totalSaved = 0;

            selected.forEach(item => {
                const giaGoc = getBasePrice(item);
                const giaHienTai = getPrice(item, discount);
                const tongGoc = giaGoc * item.qty;
                const thanhTien = giaHienTai * item.qty;
                
                totalPV += item.pv * item.qty;
                totalMoney += thanhTien;
                totalSaved += discount > 0 ? (tongGoc - thanhTien) : 0;
            });

            document.getElementById('totalPV').innerText = totalPV.toFixed(2).replace(/\.00$/, '');
            document.getElementById('totalMoney').innerText = formatMoney(totalMoney);
            
            const savedBox = document.getElementById('savedSummary');
            if (totalSaved > 0) {
                document.getElementById('totalSaved').innerText = formatMoney(totalSaved);
                savedBox.classList.add('show');
            } else {
                savedBox.classList.remove('show');
            }
            
            renderSearch();
            renderSelected(); 
        }

        function copyQuote() {
            if (selected.length === 0) {
                alert('⚠️ Chưa có sản phẩm nào để sao chép!');
                return;
            }

            let text = `🌸 ĐƠN HÀNG\n`;
            text += `🏷️ Mức chiết khấu: ${discount}%\n\n`;
            
            let tongGocAll = 0;
            let tongTietKiem = 0;

            selected.forEach((item, index) => {
                const giaGoc = getBasePrice(item);
                const giaHienTai = getPrice(item, discount);
                const thanhTien = giaHienTai * item.qty;
                const tongGoc = giaGoc * item.qty;
                const tietKiem = discount > 0 ? tongGoc - thanhTien : 0;
                
                tongGocAll += tongGoc;
                tongTietKiem += tietKiem;

                text += `${index + 1}. ${item.name}\n`;
                text += `   SL: ${item.qty}\n`;
                if (discount > 0) {
                    text += `   Giá gốc: ${formatMoney(giaGoc)} ₫ × ${item.qty} = ${formatMoney(tongGoc)} ₫\n`;
                    text += `   Sau CK ${discount}%: ${formatMoney(giaHienTai)} ₫/sp\n`;
                    text += `   → Thành tiền: ${formatMoney(thanhTien)} ₫ (tiết kiệm ${formatMoney(tietKiem)} ₫)\n`;
                } else {
                    text += `   Đơn giá: ${formatMoney(giaGoc)} ₫\n`;
                    text += `   → Thành tiền: ${formatMoney(thanhTien)} ₫\n`;
                }
                text += `   PV: ${(item.pv * item.qty).toFixed(2).replace(/\.00$/, '')}\n\n`;
            });
            
            text += `------------------------\n`;
            if (discount > 0) {
                text += `💵 Tổng giá gốc: ${formatMoney(tongGocAll)} ₫\n`;
                text += `🎉 Tổng tiết kiệm: ${formatMoney(tongTietKiem)} ₫\n`;
            }
            text += `🌸 Tổng điểm PV: ${document.getElementById('totalPV').innerText}\n`;
            text += `💰 Tổng thanh toán: ${document.getElementById('totalMoney').innerText} ₫\n`;

            navigator.clipboard.writeText(text).then(() => {
                alert('📋 Đã sao chép đơn hàng thành công!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('📋 Đã sao chép đơn hàng thành công!');
            });
        }

        function openSettings() {
            const container = document.getElementById('settingsList');
            container.innerHTML = products.map((p, index) => {
                const basePrice = getBasePrice(p);
                return `
                    <div class="setting-row" data-index="${index}">
                        <input type="text" value="${p.name}" onchange="updateSettingField(${index}, 'name', this.value)">
                        <input type="number" value="${basePrice}" onchange="updateSettingField(${index}, 'basePrice', this.value)">
                        <input type="number" step="0.01" value="${p.pv}" onchange="updateSettingField(${index}, 'pv', this.value)">
                        <button class="btn-danger" onclick="deleteProduct(${index})">🗑️</button>
                    </div>
                `;
            }).join('');
            document.getElementById('settingsModal').classList.add('active');
        }

        function updateSettingField(index, field, value) {
            if (field === 'name') {
                products[index][field] = value;
            } else if (field === 'pv') {
                products[index][field] = parseFloat(value) || 0;
            } else if (field === 'basePrice') {
                // Khi sửa giá gốc, cập nhật giá gốc trong prices
                const newBase = parseFloat(value) || 0;
                if (products[index].prices) {
                    products[index].prices[0] = newBase;
                } else {
                    products[index].basePrice = newBase;
                }
            }
        }

        function deleteProduct(index) {
            if (confirm('Xóa sản phẩm này?')) {
                const deletedId = products[index].id;
                products.splice(index, 1);
                selected = selected.filter(s => s.id !== deletedId);
                openSettings();
                renderFilterChips();
                renderSelected();
                updateTotals();
            }
        }

        function addNewProduct() {
            const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
            products.push({ 
                id: newId, 
                name: 'Sản phẩm mới', 
                category: 'Khác', 
                pv: 0, 
                prices: { 0: 0, 25: 0, 35: 0, 42: 0, 50: 0 } 
            });
            openSettings();
        }

        function saveSettings() {
            localStorage.setItem('products', JSON.stringify(products));
            document.getElementById('settingsModal').classList.remove('active');
            renderFilterChips();
            renderSearch();
            renderSelected();
            updateTotals();
            alert('💾 Đã lưu cài đặt danh mục!');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function saveData() {
            localStorage.setItem('products', JSON.stringify(products));
            localStorage.setItem('selected', JSON.stringify(selected));
            alert('💾 Đã lưu đơn hàng & dữ liệu!');
        }

        function resetData() {
            if (confirm('Khôi phục dữ liệu gốc? Toàn bộ thay đổi sẽ bị mất!')) {
                localStorage.removeItem('products');
                localStorage.removeItem('selected');
                products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
                selected = [];
                renderFilterChips();
                renderSelected();
                updateTotals();
                alert('✅ Đã khôi phục dữ liệu gốc!');
            }
        }

        // Khởi chạy
        renderFilterChips();
        renderSelected();
        updateTotals();
    </script>
</body>
</html>
