<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Giá Sản Phẩm Herbalife</title>
    <style>
        :root {
            --primary: #ff6b9d;
            --bg: #fff5f8;
            --text: #333;
            --border: #ffe0eb;
            --white: #ffffff;
            --success: #28a745;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size: 22px; }
        p.subtitle { text-align: center; color: #666; margin-top: 0; font-size: 14px; }
        
        .header-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary { background: var(--primary); color: white; flex: 1; }
        .btn-secondary { background: #6c757d; color: white; flex: 1; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 5px 10px; font-size: 12px; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(255, 107, 157, 0.1);
            border: 1px solid var(--border);
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        /* Lọc theo nhóm */
        .filter-group {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .filter-chip {
            padding: 5px 10px;
            background: #f0f0f0;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .filter-chip.active {
            background: var(--primary);
            color: white;
        }
        .filter-chip:hover { border-color: var(--primary); }

        .search-results { 
            margin-top: 10px; 
            max-height: 350px;   
            overflow-y: auto; 
            border-top: 1px dashed #eee;
            padding-top: 5px;
        }
        .search-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 8px;
            border-bottom: 1px dashed #eee;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .search-item:hover { 
            background: #fff0f5; 
            cursor: pointer;
        }
        .item-category {
            display: inline-block;
            background: #fff0f5;
            color: var(--primary);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
        }

        .selected-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .selected-table th { 
            background: #fff0f5; 
            color: var(--primary); 
            padding: 8px 5px; 
            text-align: left; 
            border-bottom: 2px solid var(--border);
            font-size: 12px;
        }
        .selected-table td { 
            padding: 10px 5px; 
            text-align: left; 
            border-bottom: 1px solid #f0f0f0; 
            vertical-align: top;
        }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .qty-control { display: flex; align-items: center; gap: 5px; justify-content: center; }
        .qty-control button { 
            padding: 2px 8px; 
            font-size: 14px; 
            background: #eee; 
            color: #333; 
            border-radius: 4px;
        }

        .price-original {
            color: #999;
            text-decoration: line-through;
            font-size: 12px;
            display: block;
        }
        .price-discount {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            display: block;
        }
        .price-saved {
            color: var(--success);
            font-size: 11px;
            font-style: italic;
            display: block;
            margin-top: 2px;
        }
        .pv-info {
            color: #888;
            font-size: 11px;
            margin-top: 3px;
        }

        .discount-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff0f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .discount-box select {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .totals {
            background: linear-gradient(135deg, #ff6b9d, #ff8e53);
            color: white;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .saved-summary {
            background: #e8f5e9;
            color: var(--success);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        .saved-summary.show { display: block; }

        .bottom-actions { display: flex; gap: 10px; }
        .bottom-actions button { flex: 1; padding: 12px; font-size: 15px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
        }
        .setting-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 40px;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .setting-row input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
        }
        .empty-msg { text-align: center; color: #999; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

    <h1>🌸 Bảng Giá Sản Phẩm</h1>
    <p class="subtitle">Chọn sản phẩm & mức chiết khấu để tính đơn hàng</p>

    <div class="header-actions">
        <button class="btn-primary" onclick="alert('Chức năng đặt hàng / Chuyển đơn!')">🛒 Đặt hàng</button>
        <button class="btn-secondary" onclick="openSettings()">⚙️ Cài đặt giá</button>
    </div>

    <!-- Tìm kiếm + Lọc nhóm -->
    <div class="card">
        <input type="text" id="searchInput" class="search-box" 
               placeholder="🔍 Nhấn để xem danh sách sản phẩm..." 
               oninput="renderSearch()" 
               onfocus="renderSearch()">
        <div class="filter-group" id="filterGroup"></div>
        <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Sản phẩm đã chọn -->
    <div class="card">
        <div class="section-title">
            <span>🌷 Sản phẩm đã chọn (<span id="selectedCount">0</span>)</span>
        </div>
        <div id="selectedList">
            <p class="empty-msg">Chưa có sản phẩm nào. Nhấn vào ô tìm kiếm để thêm nhé!</p>
        </div>
    </div>

    <!-- Khu vực Chiết khấu -->
    <div class="discount-box">
        <label for="discountSelect" style="font-weight: 600; white-space: nowrap;">Mức CK:</label>
        <select id="discountSelect" onchange="updateTotals()">
            <option value="0">Giá lẻ (0%)</option>
            <option value="25">Chiết khấu 25%</option>
            <option value="35">Chiết khấu 35%</option>
            <option value="42">Chiết khấu 42%</option>
            <option value="50">Chiết khấu 50%</option>
        </select>
    </div>

    <!-- Thông báo tiết kiệm -->
    <div class="saved-summary" id="savedSummary">
        🎉 Bạn đã tiết kiệm: <span id="totalSaved">0</span> ₫
    </div>

    <!-- Tổng kết -->
    <div class="totals">
        <div>🌸 PV: <span id="totalPV">0</span></div>
        <div>💰 Tiền: <span id="totalMoney">0</span> ₫</div>
    </div>

    <!-- Action buttons -->
    <div class="bottom-actions">
        <button class="btn-success" onclick="copyQuote()">📋 Sao chép đơn hàng</button>
        <button class="btn-secondary" onclick="saveData()">💾 Lưu thay đổi</button>
    </div>

    <!-- Modal Cài đặt -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2 style="margin-top:0; color: var(--primary);">⚙️ Cài đặt Danh mục</h2>
            <p style="font-size: 13px; color: #666;">Sửa Tên, Đơn giá gốc và Điểm PV.</p>
            <div class="setting-row" style="font-weight: 600; font-size: 12px; color: #888; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                <div>Tên sản phẩm</div>
                <div>Đơn giá</div>
                <div>Điểm PV</div>
                <div></div>
            </div>
            <div id="settingsList"></div>
            <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="addNewProduct()">+ Thêm sản phẩm mới</button>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-success" style="flex:1" onclick="saveSettings()">💾 Lưu cài đặt</button>
                <button class="btn-secondary" style="flex:1" onclick="closeSettings()">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        // DỮ LIỆU GỐC - ĐÃ TÍCH HỢP
        // Giá bán lẻ trong bảng gốc được nhân với 1000 để ra VNĐ
        const DEFAULT_PRODUCTS = [
            // Kiểm soát cân nặng
            { id: 1, name: 'F1', category: 'Kiểm soát cân nặng', pv: 23.95, basePrice: 1149120 },
            { id: 2, name: 'Protein', category: 'Kiểm soát cân nặng', pv: 17.95, basePrice: 891000 },
            { id: 3, name: 'Trà', category: 'Kiểm soát cân nặng', pv: 19.95, basePrice: 840240 },
            { id: 4, name: 'Prolessa Duo 74,2g', category: 'Kiểm soát cân nặng', pv: 21.7, basePrice: 1015200 },
            { id: 5, name: 'Prolessa Duo 318g', category: 'Kiểm soát cân nặng', pv: 65.2, basePrice: 3053160 },
            { id: 6, name: 'Cell A', category: 'Kiểm soát cân nặng', pv: 21.95, basePrice: 930960 },
            { id: 7, name: 'Cell U', category: 'Kiểm soát cân nặng', pv: 15.75, basePrice: 697680 },
            // Tăng cường đề kháng
            { id: 8, name: 'Vitamin', category: 'Tăng cường đề kháng', pv: 10, basePrice: 462240 },
            { id: 9, name: 'Immulift', category: 'Tăng cường đề kháng', pv: 27.25, basePrice: 1254960 },
            // Hệ Tiêu Hóa
            { id: 10, name: 'Lô Hội', category: 'Hệ Tiêu Hóa', pv: 24.95, basePrice: 1128600 },
            { id: 11, name: 'Xơ hoạt hóa', category: 'Hệ Tiêu Hóa', pv: 22.95, basePrice: 1065960 },
            { id: 12, name: 'Probiotic', category: 'Hệ Tiêu Hóa', pv: 20.45, basePrice: 937440 },
            // Tim mạch
            { id: 13, name: 'Nitework', category: 'Tim mạch', pv: 48.75, basePrice: 2199960 },
            { id: 14, name: 'Herbalifeline', category: 'Tim mạch', pv: 25.75, basePrice: 1072440 },
            // Xương khớp
            { id: 15, name: 'Xtra-cal', category: 'Xương khớp', pv: 10.7, basePrice: 536760 },
            { id: 16, name: 'Join Support', category: 'Xương khớp', pv: 20.9, basePrice: 935280 },
            // Mắt
            { id: 17, name: 'Ocular', category: 'Mắt', pv: 17.2, basePrice: 779760 },
            // Vận động
            { id: 18, name: 'Rebuild', category: 'Vận động', pv: 54.75, basePrice: 2370600 },
            { id: 19, name: 'F1 Sport', category: 'Vận động', pv: 41.6, basePrice: 1813320 },
            { id: 20, name: 'Hydrat', category: 'Vận động', pv: 22.2, basePrice: 1142640 },
            { id: 21, name: 'NRG', category: 'Vận động', pv: 14.75, basePrice: 658800 },
            // Hỗ trợ ngủ ngon và thư giãn
            { id: 22, name: 'Trà Tâm An', category: 'Hỗ trợ ngủ ngon', pv: 19.8, basePrice: 956880 },
            // Da và Tóc
            { id: 23, name: 'Beauty Powder 8%', category: 'Da và Tóc', pv: 43.55, basePrice: 2246400 },
            { id: 24, name: 'Mặt nạ giữ ẩm', category: 'Da và Tóc', pv: 12.45, basePrice: 576400 },
            { id: 25, name: 'Mặt nạ sáng da', category: 'Da và Tóc', pv: 13.1, basePrice: 606100 },
            { id: 26, name: 'Mặt nạ săn chắc', category: 'Da và Tóc', pv: 19.3, basePrice: 893200 },
            { id: 27, name: 'Sữa rửa mặt', category: 'Da và Tóc', pv: 16.75, basePrice: 707300 },
            { id: 28, name: 'Toner 50 ml', category: 'Da và Tóc', pv: 12.7, basePrice: 546700 },
            { id: 29, name: 'Toner 150 ml', category: 'Da và Tóc', pv: 32.3, basePrice: 1394800 },
            { id: 30, name: 'Dưỡng ẩm số 5', category: 'Da và Tóc', pv: 28.4, basePrice: 1196800 },
            { id: 31, name: 'Serum số 3', category: 'Da và Tóc', pv: 37.7, basePrice: 1608200 },
            { id: 32, name: 'Mắt số 4', category: 'Da và Tóc', pv: 26.35, basePrice: 1109900 },
            { id: 33, name: 'Tẩy da chết', category: 'Da và Tóc', pv: 13.1, basePrice: 589600 },
            { id: 34, name: 'Mặt nạ đất sét', category: 'Da và Tóc', pv: 14.2, basePrice: 643500 },
            { id: 35, name: 'Bộ da cơ bản', category: 'Da và Tóc', pv: 86.25, basePrice: 3647600 },
            { id: 36, name: 'Bộ da nâng cao', category: 'Da và Tóc', pv: 176.65, basePrice: 7475600 },
            { id: 37, name: 'Bộ da Tối ưu', category: 'Da và Tóc', pv: 203.95, basePrice: 8708700 },
            { id: 38, name: 'Dầu gội/xả', category: 'Da và Tóc', pv: 8.3, basePrice: 336600 }
        ];

        // Load dữ liệu: ưu tiên localStorage, nếu chưa có thì dùng dữ liệu gốc
        let products = JSON.parse(localStorage.getItem('products')) || DEFAULT_PRODUCTS;
        let selected = JSON.parse(localStorage.getItem('selected')) || [];
        let discount = 0;
        let currentCategory = 'Tất cả'; // Bộ lọc nhóm hiện tại

        function formatMoney(num) {
            return new Intl.NumberFormat('vi-VN').format(num);
        }

        // Lấy danh sách nhóm sản phẩm duy nhất
        function getCategories() {
            const cats = [...new Set(products.map(p => p.category).filter(c => c))];
            return ['Tất cả', ...cats];
        }

        // Render các chip lọc nhóm
        function renderFilterChips() {
            const container = document.getElementById('filterGroup');
            const categories = getCategories();
            container.innerHTML = categories.map(cat => `
                <div class="filter-chip ${cat === currentCategory ? 'active' : ''}" 
                     onclick="setCategory('${cat}')">${cat}</div>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderFilterChips();
            renderSearch();
        }

        function renderSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const container = document.getElementById('searchResults');

            let results = products;
            // Lọc theo nhóm
            if (currentCategory !== 'Tất cả') {
                results = results.filter(p => p.category === currentCategory);
            }
            // Lọc theo từ khóa
            if (keyword) {
                results = results.filter(p => p.name.toLowerCase().includes(keyword));
            }

            if (results.length === 0) {
                container.innerHTML = '<p class="empty-msg">Không tìm thấy sản phẩm</p>';
                return;
            }

            container.innerHTML = results.map(p => `
                <div class="search-item" onclick="addToSelected(${p.id})">
                    <div>
                        <strong>${p.name}</strong>
                        ${p.category ? `<span class="item-category">${p.category}</span>` : ''}
                        <br>
                        <small style="color:#666">Giá: ${formatMoney(p.basePrice)} ₫ | PV: ${p.pv}</small>
                    </div>
                    <button class="btn-primary btn-sm" onclick="event.stopPropagation(); addToSelected(${p.id})">+ Thêm</button>
                </div>
            `).join('');
        }

        function addToSelected(id) {
            const prod = products.find(p => p.id === id);
            const exist = selected.find(s => s.id === id);
            if (exist) {
                exist.qty += 1;
            } else {
                selected.push({ ...prod, qty: 1 });
            }
            renderSelected();
            updateTotals();
        }

        function renderSelected() {
            const container = document.getElementById('selectedList');
            document.getElementById('selectedCount').innerText = selected.length;

            if (selected.length === 0) {
                container.innerHTML = '<p class="empty-msg">Chưa có sản phẩm nào. Nhấn vào ô tìm kiếm để thêm nhé!</p>';
                return;
            }

            let html = `
                <table class="selected-table">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th class="text-center">SL</th>
                            <th class="text-right">Đơn giá</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            selected.forEach(item => {
                const giaGoc1SP = item.basePrice;
                const giaSauCK1SP = giaGoc1SP * (1 - discount / 100);
                const thanhTien = giaSauCK1SP * item.qty;
                const tongGoc = giaGoc1SP * item.qty;
                const tietKiem = discount > 0 ? tongGoc - thanhTien : 0;

                let priceCell = '';
                if (discount > 0) {
                    priceCell = `
                        <span class="price-original">${formatMoney(giaGoc1SP)} ₫</span>
                        <span class="price-discount">${formatMoney(giaSauCK1SP)} ₫</span>
                        <span class="price-saved">TK: ${formatMoney(tietKiem)} ₫</span>
                    `;
                } else {
                    priceCell = `<span class="price-discount">${formatMoney(giaGoc1SP)} ₫</span>`;
                }

                html += `
                    <tr>
                        <td>
                            <strong>${item.name}</strong>
                            <div class="pv-info">🌸 PV: ${item.pv * item.qty}</div>
                        </td>
                        <td class="text-center">
                            <div class="qty-control">
                                <button onclick="changeQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </td>
                        <td class="text-right">${priceCell}</td>
                        <td><button class="btn-danger" onclick="removeItem(${item.id})">X</button></td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function changeQty(id, delta) {
            const item = selected.find(s => s.id === id);
            item.qty += delta;
            if (item.qty <= 0) selected = selected.filter(s => s.id !== id);
            renderSelected();
            updateTotals();
        }

        function removeItem(id) {
            selected = selected.filter(s => s.id !== id);
            renderSelected();
            updateTotals();
        }

        function updateTotals() {
            discount = parseFloat(document.getElementById('discountSelect').value);
            let totalPV = 0;
            let totalMoney = 0;
            let totalSaved = 0;

            selected.forEach(item => {
                const tongGoc = item.basePrice * item.qty;
                const thanhTien = tongGoc * (1 - discount / 100);
                totalPV += item.pv * item.qty;
                totalMoney += thanhTien;
                totalSaved += discount > 0 ? (tongGoc - thanhTien) : 0;
            });

            document.getElementById('totalPV').innerText = totalPV.toFixed(2).replace(/\.00$/, '');
            document.getElementById('totalMoney').innerText = formatMoney(totalMoney);
            
            const savedBox = document.getElementById('savedSummary');
            if (totalSaved > 0) {
                document.getElementById('totalSaved').innerText = formatMoney(totalSaved);
                savedBox.classList.add('show');
            } else {
                savedBox.classList.remove('show');
            }
            
            renderSelected(); 
        }

        function copyQuote() {
            if (selected.length === 0) {
                alert('⚠️ Chưa có sản phẩm nào để sao chép!');
                return;
            }

            let text = `🌸 ĐƠN HÀNG\n`;
            text += `🏷️ Mức chiết khấu: ${discount}%\n\n`;
            
            let tongGocAll = 0;
            let tongTietKiem = 0;

            selected.forEach((item, index) => {
                const giaGoc1SP = item.basePrice;
                const giaSauCK1SP = giaGoc1SP * (1 - discount / 100);
                const thanhTien = giaSauCK1SP * item.qty;
                const tongGoc = giaGoc1SP * item.qty;
                const tietKiem = discount > 0 ? tongGoc - thanhTien : 0;
                
                tongGocAll += tongGoc;
                tongTietKiem += tietKiem;

                text += `${index + 1}. ${item.name}\n`;
                text += `   SL: ${item.qty}\n`;
                if (discount > 0) {
                    text += `   Giá gốc: ${formatMoney(giaGoc1SP)} ₫ × ${item.qty} = ${formatMoney(tongGoc)} ₫\n`;
                    text += `   Sau CK ${discount}%: ${formatMoney(giaSauCK1SP)} ₫/sp\n`;
                    text += `   → Thành tiền: ${formatMoney(thanhTien)} ₫ (tiết kiệm ${formatMoney(tietKiem)} ₫)\n`;
                } else {
                    text += `   Đơn giá: ${formatMoney(giaGoc1SP)} ₫\n`;
                    text += `   → Thành tiền: ${formatMoney(thanhTien)} ₫\n`;
                }
                text += `   PV: ${item.pv * item.qty}\n\n`;
            });
            
            text += `------------------------\n`;
            if (discount > 0) {
                text += `💵 Tổng giá gốc: ${formatMoney(tongGocAll)} ₫\n`;
                text += `🎉 Tổng tiết kiệm: ${formatMoney(tongTietKiem)} ₫\n`;
            }
            text += `🌸 Tổng điểm PV: ${document.getElementById('totalPV').innerText}\n`;
            text += `💰 Tổng thanh toán: ${document.getElementById('totalMoney').innerText} ₫\n`;

            navigator.clipboard.writeText(text).then(() => {
                alert('📋 Đã sao chép đơn hàng thành công!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('📋 Đã sao chép đơn hàng thành công!');
            });
        }

        function openSettings() {
            const container = document.getElementById('settingsList');
            container.innerHTML = products.map((p, index) => `
                <div class="setting-row" data-index="${index}">
                    <input type="text" value="${p.name}" onchange="updateSettingField(${index}, 'name', this.value)">
                    <input type="number" value="${p.basePrice}" onchange="updateSettingField(${index}, 'basePrice', this.value)">
                    <input type="number" step="0.01" value="${p.pv}" onchange="updateSettingField(${index}, 'pv', this.value)">
                    <button class="btn-danger" onclick="deleteProduct(${index})">🗑️</button>
                </div>
            `).join('');
            document.getElementById('settingsModal').classList.add('active');
        }

        function updateSettingField(index, field, value) {
            if (field === 'name') products[index][field] = value;
            else products[index][field] = parseFloat(value) || 0;
        }

        function deleteProduct(index) {
            if (confirm('Xóa sản phẩm này?')) {
                const deletedId = products[index].id;
                products.splice(index, 1);
                selected = selected.filter(s => s.id !== deletedId);
                openSettings();
                renderFilterChips();
                renderSelected();
                updateTotals();
            }
        }

        function addNewProduct() {
            const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
            products.push({ id: newId, name: 'Sản phẩm mới', category: 'Khác', basePrice: 0, pv: 0 });
            openSettings();
        }

        function saveSettings() {
            localStorage.setItem('products', JSON.stringify(products));
            document.getElementById('settingsModal').classList.remove('active');
            renderFilterChips();
            renderSearch();
            renderSelected();
            updateTotals();
            alert('💾 Đã lưu cài đặt danh mục!');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function saveData() {
            localStorage.setItem('products', JSON.stringify(products));
            localStorage.setItem('selected', JSON.stringify(selected));
            alert('💾 Đã lưu đơn hàng & dữ liệu!');
        }

        function resetData() {
            if (confirm('Khôi phục dữ liệu gốc? Toàn bộ thay đổi sẽ bị mất!')) {
                localStorage.removeItem('products');
                localStorage.removeItem('selected');
                products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
                selected = [];
                renderFilterChips();
                renderSelected();
                updateTotals();
                alert('✅ Đã khôi phục dữ liệu gốc!');
            }
        }

        // Khởi chạy
        renderFilterChips();
        renderSelected();
        updateTotals();
    </script>
</body>
</html>
